<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="_favicon.ico">
  <title>Painel do aluno - TCCOn</title>
</head>
<body class="bg-light">

<div class="container py-5">
  <h1 class="mb-4 text-center">Painel do aluno</h1>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

    <!-- Atalho para controle de relatórios -->
    <div class="col">
      <div class="card h-100 shadow-sm">
        <div class="card-body d-flex flex-column justify-content-between">
          <h5 class="card-title">Termo de compromisso</h5>
          <p class="card-text">Acesse a página para preencher o termo de compromisso.</p>
          <a href="termo-de-compromisso.html" class="btn btn-primary mt-3">Acessar</a>
        </div>
      </div>
    </div>

    <!-- Espaço reservado para futuros atalhos -->
    <div class="col">
      <div class="card h-100 shadow-sm border-secondary">
        <div class="card-body d-flex flex-column justify-content-between">
          <h5 class="card-title text-muted">Em breve</h5>
          <p class="card-text text-muted">Espaço reservado para novas funcionalidades do painel.</p>
          <button class="btn btn-secondary mt-3" disabled>Indisponível</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/painelDoAluno.js"></script>
</body>
</html>
