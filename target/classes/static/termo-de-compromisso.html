<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="_favicon.ico">
  <title>Termo de compromisso - TCCOn</title>
</head>
<body class="bg-light">

<div class="container py-5">
  <h1 class="mb-4 text-center">Termo de compromisso</h1>

  <div id="mensagem" class="mb-3"></div>

  <form id="formularioDoTermo" class="card p-4 shadow-sm mb-5">
    <div class="mb-3">
      <label for="emailDoOrientador" class="form-label">Identificação do orientador</label>
      <input type="text" class="form-control" id="emailDoOrientador" placeholder="Digite o email @furb.br do orientador" required>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="coorientadorCheckbox">
      <label class="form-check-label" for="coorientadorCheckbox">
        Adicionar coorientador
      </label>
    </div>
    <div id="coorientadorMenu" class="collapse">
      <div class="mb-3">
        <label for="emailDoCoorientador" class="form-label">Identificação do coorientador</label>
        <input type="text" class="form-control" id="emailDoCoorientador" placeholder="Digite o email @furb.br do coorientador">
      </div>
      <div class="mb-3">
        <label for="perfilDoCoorientador" class="form-label">Perfil do coorientador (menos de 500 caracteres)</label>
        <textarea class="form-control" id="perfilDoCoorientador" rows="3" placeholder="Descreva brevemente o perfil do coorientador"></textarea>
      </div>
    </div>

    <div class="mb-3">
      <label for="tituloDoTrabalho" class="form-label">Identificação do trabalho</label>
      <input type="text" class="form-control" id="tituloDoTrabalho" placeholder="Digite o título do trabalho" required>
    </div>
    <div class="mb-3">
      <label for="semestreDaFormatura" class="form-label">Quando (ano/semestre) você cursará TCC II?</label>
      <div class="d-flex gap-2">
        <select class="form-select" id="anoDaFormatura" required>
          <option value="">Ano</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
          <option value="2029">2029</option>
          <option value="2030">2030</option>
        </select>
        <select class="form-select" id="semestreDaFormatura" required>
          <option value="">Semestre</option>
          <option value="1">1</option>
          <option value="2">2</option>
        </select>
      </div>
    </div>

    <div class="mb-3">
      <label for="resumoDoProblema" class="form-label">Resumo do problema (menos de 2000 caracteres)</label>
      <textarea class="form-control" id="resumoDoProblema" rows="4" placeholder="Digite um breve resumo do trabalho" required></textarea>
    </div>

    <div class="mb-4">
      <button type="submit" class="btn btn-primary">Finalizar</button>
    </div>
  </form>

  <!-- Contêiner para visualização do termo caso já exista -->
  <div id="visualizacaoDoTermo" class="card p-4 shadow-sm mb-5 d-none">
    <h5 class="mb-3">Informações do termo de compromisso</h5>
    <p><strong>Título:</strong> <span id="termoTitulo"></span></p>
    <p><strong>Orientador:</strong> <span id="termoOrientador"></span></p>
    <p id="termoCoorientadorContainer"><strong>Coorientador:</strong> <span id="termoCoorientador"></span></p>
    <p><strong>Ano/Semestre da formatura:</strong> <span id="termoAnoSemestre"></span></p>
    <p><strong>Resumo:</strong> <span id="termoResumo"></span></p>
    <div id="termoStatus" class="alert text-center" role="alert"></div>
  </div>

  <div class="mb-4 text-center">
      <a href="painel-do-aluno.html">Voltar ao painel do aluno</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/termoDeCompromisso.js"></script>
</body>
</html>
