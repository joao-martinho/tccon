<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="icon" href="../_favicon.ico">
  <title>Revisão de entregas - TCCOn</title>
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a href="painel.html" class="btn btn-outline-secondary">← Voltar ao painel</a>
    <button id="btnSair" class="btn btn-outline-danger">Sair</button>
  </div>

  <h1 class="mb-4 text-center">Revisão de entregas</h1>

  <div class="card p-4 shadow-sm mb-5">
    <div class="row g-4">
      <div class="col-md-6">
        <h5>Documento do aluno</h5>
        <div class="d-flex align-items-center">
          <input type="text" class="form-control me-2" id="tituloAluno" placeholder="Título do documento" readonly>
          <a id="btnBaixarAluno" class="btn btn-outline-primary">Baixar</a>
        </div>
      </div>

      <div class="col-md-6">
        <h5>Sua revisão</h5>
        <form id="formularioRevisao">
          <div class="mb-3">
            <input type="file" class="form-control" id="arquivoRevisao" accept=".pdf,.doc,.docx,.odt" required>
          </div>
          <button type="submit" class="btn btn-success">Enviar revisão</button>
        </form>
      </div>
    </div>
  </div>

  <div class="table-responsive" id="tabelaRevisoes">
    <table class="table table-hover table-bordered table-striped align-middle shadow-sm">
      <thead class="table-dark">
        <tr>
          <th scope="col">Título do aluno</th>
          <th scope="col">Data de envio</th>
          <th scope="col">Arquivo de revisão</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="js/entregasParciais.js"></script>
</body>
</html>
