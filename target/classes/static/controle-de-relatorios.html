<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="_favicon.ico">
  <title>Controle de relatórios - TCCOn</title>
</head>
<body class="bg-light">

<div class="container py-5">
  <h1 class="mb-4 text-center">Controle de relatórios</h1>

  <form id="formularioRelatorios" class="card p-4 shadow-sm mb-5">
    <div class="mb-3">
      <label for="titulo" class="form-label">Título do relatório</label>
      <input type="text" class="form-control" id="titulo" placeholder="Digite o título" required>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="dataDeInicio" class="form-label">Data de início</label>
        <input type="date" class="form-control" id="dataDeInicio" required>
      </div>
      <div class="col-md-6 mb-3">
        <label for="dataDeFim" class="form-label">Data de fim</label>
        <input type="date" class="form-control" id="dataDeFim" required>
      </div>
    </div>

    <div class="mb-3">
      <label for="horasTrabalhadas" class="form-label">Número de horas trabalhadas</label>
      <input type="number" class="form-control" id="horasTrabalhadas" placeholder="Digite o total de horas" min="0" required>
    </div>

    <div class="mb-3">
      <label for="descricao" class="form-label">Descrição</label>
      <textarea class="form-control" id="descricao" rows="4" placeholder="Escreva os detalhes do relatório" required></textarea>
    </div>

    <div class="mb-4">
      <button type="submit" class="btn btn-primary">Registrar</button>
    </div>
  </form>

  <div class="mb-4 text-center">
      <a href="painel-do-aluno.html">Voltar ao painel do aluno</a>
  </div>

  <div class="table-responsive" id="tabelaRelatorios">
  <table class="table table-bordered table-striped align-middle shadow-sm">
    <thead class="table-dark">
      <tr>
        <th scope="col">Título</th>
        <th scope="col">Início</th>
        <th scope="col">Fim</th>
        <th scope="col">Horas</th>
        <th scope="col">Ações</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/controleDeRelatorios.js"></script>
</body>
</html>
